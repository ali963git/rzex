kind = "web"
previewPath = "/"
title = "RZEX — Cryptocurrency Trading Platform"
version = "1.0.0"
id = "artifacts/rzex"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18583

[services.development]
run = "pnpm --filter @workspace/rzex run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rzex", "run", "build" ]
publicDir = "artifacts/rzex/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18583"
BASE_PATH = "/"
