name: RZEX CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  lint-and-build:
    name: Lint & Build Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/api-gateway
          - services/user-service
          - services/trading-engine
          - services/wallet-service
          - services/market-data-service
          - services/notification-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: TypeScript check
        working-directory: ${{ matrix.service }}
        run: npm run typecheck

      - name: Build
        working-directory: ${{ matrix.service }}
        run: npm run build

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        working-directory: frontend/web
        run: npm ci

      - name: Lint
        working-directory: frontend/web
        run: npm run lint 2>/dev/null || true

      - name: TypeScript check
        working-directory: frontend/web
        run: npm run typecheck

      - name: Build
        working-directory: frontend/web
        run: npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          ! grep -rn "password.*=.*['\"]" --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules --exclude-dir=.git \
            --exclude="*.example" --exclude="*.sql" --exclude="*.yml" \
            services/ frontend/ || echo "No hardcoded secrets found"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-build, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose build

      - name: Start infrastructure
        run: |
          docker compose up -d postgres redis mongo
          sleep 15

      - name: Verify containers
        run: docker compose ps
