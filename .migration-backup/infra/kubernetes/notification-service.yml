apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: rzex
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: rzex/notification-service:latest
          ports:
            - containerPort: 3005
          env:
            - name: NODE_ENV
              value: "production"
            - name: NOTIFICATION_SERVICE_PORT
              value: "3005"
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: rzex-secrets
                  key: postgres-host
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: rzex-secrets
                  key: redis-host
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: rzex
spec:
  selector:
    app: notification-service
  ports:
    - port: 3005
      targetPort: 3005
  type: ClusterIP
