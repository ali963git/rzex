version: "3.9"
services:
  gateway:
    build: ./services/gateway
    ports: ["8000:8000"]
    environment:
      - AUTH_SERVICE_URL=http://auth:5001
      - WALLET_SERVICE_URL=http://wallet:5002
      - MATCHING_ENGINE_URL=http://matching-engine:5003
      - MARKET_DATA_URL=http://market-data:5004
    depends_on: [auth, wallet, matching-engine, market-data]
    networks: [rzex-net]

  auth:
    build: ./services/auth
    environment:
      - DATABASE_URL=postgresql://rzex:password@postgres:5432/auth_db
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [rzex-net]

  wallet:
    build: ./services/wallet
    environment:
      - DATABASE_URL=postgresql://rzex:password@postgres:5432/wallet_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [rzex-net]

  matching-engine:
    build: ./services/matching-engine
    environment:
      - REDIS_URL=redis://redis:6379
      - WALLET_SERVICE_URL=http://wallet:5002
    depends_on:
      redis: { condition: service_healthy }
      wallet: { condition: service_started }
    networks: [rzex-net]

  market-data:
    build: ./services/market-data
    environment:
      - MONGODB_URI=mongodb://mongo:27017/marketdata
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [rzex-net]

  audit-logger:
    build: ./services/audit-logger
    environment:
      - DATABASE_URL=postgresql://rzex:password@postgres:5432/audit_db
      - REDIS_URL=redis://redis:6379
    depends_on: [postgres, redis]
    networks: [rzex-net]

  security-monitor:
    build: ./services/security-monitor
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on: [redis]
    networks: [rzex-net]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://gateway:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://gateway:8000/ws
    depends_on: [gateway]
    networks: [rzex-net]

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rzex
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rzex"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [rzex-net]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [rzex-net]

  mongo:
    image: mongo:6
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [rzex-net]

networks:
  rzex-net:

volumes:
  postgres-data: