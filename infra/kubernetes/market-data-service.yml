apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-service
  namespace: rzex
  labels:
    app: market-data-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-data-service
  template:
    metadata:
      labels:
        app: market-data-service
    spec:
      containers:
        - name: market-data-service
          image: rzex/market-data-service:latest
          ports:
            - containerPort: 3004
          env:
            - name: NODE_ENV
              value: "production"
            - name: MARKET_DATA_PORT
              value: "3004"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: rzex-secrets
                  key: mongo-uri
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: rzex-secrets
                  key: redis-host
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: market-data-service
  namespace: rzex
spec:
  selector:
    app: market-data-service
  ports:
    - port: 3004
      targetPort: 3004
  type: ClusterIP
