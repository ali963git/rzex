apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: rzex
  labels:
    app: wallet-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wallet-service
  template:
    metadata:
      labels:
        app: wallet-service
    spec:
      containers:
        - name: wallet-service
          image: rzex/wallet-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: NODE_ENV
              value: "production"
            - name: WALLET_SERVICE_PORT
              value: "3003"
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: rzex-secrets
                  key: postgres-host
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rzex-secrets
                  key: postgres-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
  namespace: rzex
spec:
  selector:
    app: wallet-service
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP
